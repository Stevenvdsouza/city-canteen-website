<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - City Canteen</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/cart.css">
  <script src="js/cart-utils.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-container">
      <a href="index.html" class="logo">
        <div class="logo-circle">🍽️</div>
        <span class="logo-text">City Canteen</span>
      </a>
      <a href="index.html"><button class="back-btn">← Continue Shopping</button></a>
    </div>
  </header>

 
  <div class="modal-overlay" id="billModal">
    <div class="modal">
      <div class="modal-header">
        <h3>🧾 Bill</h3>
        <button class="modal-close" onclick="document.getElementById('billModal').classList.remove('open')">✕</button>
      </div>
      <div class="bill-body" id="billBody"></div>
    </div>
  </div>

  
  <div style="max-width:700px;margin:3rem auto;padding:0 1.5rem;display:none;" id="confirmationSection">
    <div class="tracker-card" style="text-align:center;padding:2.5rem 2rem;">
      <div style="font-size:4rem;margin-bottom:1rem;">🎉</div>
      <h2 style="margin:0 0 .5rem;font-size:1.6rem;color:var(--primary);">Order Placed!</h2>
      <p style="color:var(--gray-500);margin:0 0 1.5rem;font-size:.95rem;">
        Thank you! Your order has been received and is being processed.
      </p>
      <div class="customer-info" id="confirmCustomerInfo" style="justify-content:center;margin-bottom:1.5rem;"></div>
      <div style="background:var(--gray-50,#f8f9fa);border-radius:12px;padding:1rem 1.5rem;margin-bottom:1rem;text-align:left;" id="confirmItemList"></div>
      <div style="background:var(--gray-50,#f8f9fa);border-radius:12px;padding:1rem 1.5rem;margin-bottom:1.5rem;font-size:.9rem;color:var(--gray-600,#555);">
        🍽️ Sit back and relax — our staff will bring your order to your table shortly.
      </div>
      <a href="index.html">
        <button class="submit-btn" style="width:auto;padding:.75rem 2rem;">← Back to Menu</button>
      </a>
    </div>
  </div>

 
  <div class="page" id="cartPage">
    
    <div>
      <div class="card">
        <div class="card-header">
          <h2>🛒 Your Order</h2>
          <span class="item-count" id="itemCount">0 items</span>
        </div>
        <div class="cart-list" id="cartList"></div>
      </div>

      
      <div class="card" style="margin-top:1rem;">
        <div class="card-header"><h2>👤 Your Details</h2></div>
        <div class="customer-form">
          <div class="form-row">
            <div class="form-group">
              <label>Name *</label>
              <input type="text" id="custName">
            </div>
            <div class="form-group">
              <label>Phone Number *</label>
              <input type="tel" id="custPhone" min="1" max="10">
            </div>
          </div>
          <div class="form-group">
            <label>Table Number * <small style="color:#6b7280;font-weight:400;">(1–10)</small></label>
            <input type="number" id="custTable" min="1" max="10">
          </div>
        </div>
      </div>
    </div>

    
    <div>
      <div class="card">
        <div class="card-header"><h2>Order Summary</h2></div>
        <div class="summary-body">
          <div class="summary-items" id="summaryItems"></div>
          <hr class="summary-divider">
          <div class="summary-row total"><span>Total</span><span id="total">₹0</span></div>
          <button class="submit-btn" id="submitBtn" onclick="submitOrder()">Place Order →</button>
          <a href="index.html"><button class="continue-btn">← Back to Menu</button></a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/cart.js"></script>
</body>
</html>
